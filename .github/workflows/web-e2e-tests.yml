name: Web E2E Tests (Playwright)

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/web/**'
      - 'apps/backend/**'
      - 'packages/shared/**'
      - '.github/workflows/web-e2e-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/web/**'
      - 'apps/backend/**'
      - 'packages/shared/**'
      - '.github/workflows/web-e2e-tests.yml'
  workflow_dispatch:

jobs:
  e2e-tests:
    name: E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    # Spin up a Postgres for the backend to talk to. Plays the same role as
    # Railway's DB in production, but ephemeral per-job.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: horus
          POSTGRES_PASSWORD: horus
          POSTGRES_DB: horus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://horus:horus@localhost:5432/horus_test?schema=public
      # CI-only throwaway secrets — never reused outside this ephemeral run.
      JWT_SECRET: ci-jwt-secret-must-be-long-enough-to-pass-zod-validation-32chars
      JWT_REFRESH_SECRET: ci-refresh-secret-also-long-enough-to-pass-zod-validation-32
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      NODE_ENV: test
      PORT: '3000'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @horus/shared
        run: pnpm --filter @horus/shared build

      - name: Generate Prisma client
        run: pnpm --filter @horus/backend db:generate

      - name: Apply migrations to ephemeral Postgres
        run: pnpm --filter @horus/backend exec prisma migrate deploy

      - name: Install Playwright Browsers
        run: pnpm --filter @horus/web exec playwright install --with-deps ${{ matrix.browser }}

      # Run the backend in the background. tsx skips the compile step so the
      # E2E job doesn't depend on backend `tsc` being clean.
      - name: Start backend in background
        run: |
          pnpm --filter @horus/backend exec tsx src/index.ts > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for backend to be ready
        run: npx --yes wait-on http://localhost:3000/api/health --timeout 90000 --interval 1000

      - name: Run Playwright tests
        run: pnpm --filter @horus/web test:e2e:${{ matrix.browser }}
        env:
          CI: true

      - name: Show backend log on failure
        if: failure()
        run: |
          echo "===== backend.log (last 200 lines) ====="
          tail -n 200 backend.log || true

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill "$(cat backend.pid)" 2>/dev/null || true
          fi

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.browser }}
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots-${{ matrix.browser }}
          path: apps/web/test-results/
          retention-days: 7

  e2e-report:
    name: Publish Test Report
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      - name: Publish HTML Report
        uses: peaceiris/actions-gh-pages@v3
        # Only attempt when chromium artifact exists (i.e. at least chromium failed
        # so playwright-report was uploaded). Otherwise the action errors with
        # "no such file or directory".
        if: github.ref == 'refs/heads/main' && hashFiles('all-reports/playwright-results-chromium/**/*') != ''
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./all-reports/playwright-results-chromium
          destination_dir: e2e-reports
